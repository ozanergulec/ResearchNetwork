services:
  # --- Veritabanı (pgvector destekli) ---
  postgres:
    image: pgvector/pgvector:pg17
    container_name: research_network_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: researchnetwork
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - research-net
    restart: always

  # --- Backend API ---
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: research_network_api
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Docker içinde host 'postgres' olarak görünür (iç port 5432)
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=researchnetwork;Username=postgres;Password=postgres
      # Email SMTP Ayarları (.env dosyasından okunur)
      - Email__SmtpHost=${SMTP_HOST:-smtp.gmail.com}
      - Email__SmtpPort=${SMTP_PORT:-587}
      - Email__SmtpUser=${SMTP_USER}
      - Email__SmtpPass=${SMTP_PASS}
      - Email__FromEmail=${SMTP_USER}
      - Email__FromName=Research Network
      - AiService__BaseUrl=http://ai-service:8000
    ports:
      - "5051:8080"
    depends_on:
      - postgres
      - ai-service
    volumes:
      - uploads_data:/app/wwwroot/uploads
    networks:
      - research-net
    restart: on-failure

  # --- AI Service ---
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai-service
    container_name: research_network_ai
    environment:
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - SUMMARIZATION_MODEL=sshleifer/distilbart-cnn-12-6
      - CLASSIFICATION_MODEL=valhalla/distilbart-mnli-12-1
      - ALLOWED_ORIGINS=http://localhost:5000,http://localhost:5001,http://localhost:5051,http://api:8080
    ports:
      - "8000:8000"
    volumes:
      - model_cache:/root/.cache/huggingface
    networks:
      - research-net

networks:
  research-net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  model_cache: